name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Copy files to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          source: "."
          target: "~/AgentOps"

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            cd ~/AgentOps/
            cat << EOF > .env
            ENV="production"
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}
            MYSQL_USER=${{ secrets.MYSQL_USER }}
            MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
            MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
            EOF
            chmod 600 .env

            # 여러 애플리케이션이 공용으로 사용하는 nginx 설정 디렉토리/네트워크
            mkdir -p ~/nginx/conf.d
            docker network inspect proxy_net >/dev/null 2>&1 || docker network create proxy_net

            # 이 애플리케이션 전용 server 블록만 공용 conf.d 디렉토리에 배치
            cat <<'EOF' > ~/nginx/conf.d/agentops.conf
            server {
              listen 8080 ssl;
              server_name api.agentops.p-e.kr;

              ssl_certificate /etc/letsencrypt/live/api.agentops.p-e.kr/fullchain.pem;
              ssl_certificate_key /etc/letsencrypt/live/api.agentops.p-e.kr/privkey.pem;
              ssl_protocols TLSv1.2 TLSv1.3;
              ssl_prefer_server_ciphers on;

              client_max_body_size 10m;

              location / {
                proxy_pass http://agent_service:8000;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
              }
            }
            EOF
            docker compose up mydb -d
            docker compose up agent_service -d --build --force-recreate
            docker compose up nginx -d
            # 이미 떠 있는 공용 nginx는 재시작 대신 설정만 무중단 reload
            docker exec nginx_container nginx -t \
              && docker exec nginx_container nginx -s reload
            docker container prune -f
            docker image prune -f
            docker buildx prune -f
            echo "Deployment completed successfully!"
